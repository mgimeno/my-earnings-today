version: 2.1
parameters:
  project-folder:
    type: string
    default: 'my-earnings-today'
  temp-upload-folder-slug:
    type: string
    default: '-temp-upload'
  server-base-folder:
    type: string
    default: '/home/$SSH_USER/apps/'
  build-dist-folder:
    type: string
    default: 'dist'

jobs:
  build:
    working_directory: ~/<< pipeline.parameters.project-folder >>
    docker:
      - image: cimg/node:24.15.0
    steps:
      - checkout
      - run:
          name: Verify Node version
          command: node -p "process.platform + ' ' + process.arch + ' node ' + process.version"
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Run unit tests
          command: npm test
      - run:
          name: Build
          command: npm run build:prod
      - persist_to_workspace:
          root: ~/<< pipeline.parameters.project-folder >>
          paths:
            - << pipeline.parameters.build-dist-folder >>

  deploy:
    working_directory: ~/<< pipeline.parameters.project-folder >>
    docker:
      - image: cimg/base:stable
    steps:
      - attach_workspace:
          at: ~/<< pipeline.parameters.project-folder >>
      - add_ssh_keys:
          fingerprints:
            - 'SHA256:UIwOHqUMl4umSJ+Ey3v5ljwWSVGELUlFgOLF+J+yUWg'
      - run:
          name: Deploy to server
          no_output_timeout: 5m
          command: |
            mkdir -p ~/.ssh
            ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

            # Prepare temp folder
            ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "rm -rf << pipeline.parameters.server-base-folder >><< pipeline.parameters.project-folder >><< pipeline.parameters.temp-upload-folder-slug >>"
            ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p << pipeline.parameters.server-base-folder >><< pipeline.parameters.project-folder >><< pipeline.parameters.temp-upload-folder-slug >>"

            # Zip and upload
            cd << pipeline.parameters.build-dist-folder >>
            zip -r << pipeline.parameters.project-folder >>.zip ./*
            scp -P "$SSH_PORT" << pipeline.parameters.project-folder >>.zip "$SSH_USER@$SSH_HOST:<< pipeline.parameters.server-base-folder >><< pipeline.parameters.project-folder >><< pipeline.parameters.temp-upload-folder-slug >>"

            # Unzip and swap
            ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "unzip -d << pipeline.parameters.server-base-folder >><< pipeline.parameters.project-folder >><< pipeline.parameters.temp-upload-folder-slug >> << pipeline.parameters.server-base-folder >><< pipeline.parameters.project-folder >><< pipeline.parameters.temp-upload-folder-slug >>/<< pipeline.parameters.project-folder >>.zip"
            ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "rm -f << pipeline.parameters.server-base-folder >><< pipeline.parameters.project-folder >><< pipeline.parameters.temp-upload-folder-slug >>/<< pipeline.parameters.project-folder >>.zip"
            ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "rm -rf << pipeline.parameters.server-base-folder >><< pipeline.parameters.project-folder >>"
            ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mv << pipeline.parameters.server-base-folder >><< pipeline.parameters.project-folder >><< pipeline.parameters.temp-upload-folder-slug >> << pipeline.parameters.server-base-folder >><< pipeline.parameters.project-folder >>"

workflows:
  build-and-deploy:
    jobs:
      - build
      - deploy:
          requires:
            - build
          filters:
            branches:
              only: main
