version: 2.1
parameters:
  project-folder:
    type: string
    default: 'my-earnings-today'
  temp-upload-folder-slug:
    type: string
    default: '-temp-upload'
  server-base-folder:
    type: string
    default: '/home/$SSH_USER/apps/'
  build-dist-folder:
    type: string
    default: 'dist'

jobs:
  build:
    working_directory: ~/<< pipeline.parameters.project-folder >>
    docker:
      - image: cimg/node:24.15.0
    steps:
      - checkout
      - run:
          name: Verify Node version
          command: node -p "process.platform + ' ' + process.arch + ' node ' + process.version"
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Run unit tests
          command: npm test
      - run:
          name: Build
          command: npm run build:prod
      - persist_to_workspace:
          root: ~/<< pipeline.parameters.project-folder >>
          paths:
            - << pipeline.parameters.build-dist-folder >>
            - scripts/deploy-retained-assets.sh

  deploy:
    working_directory: ~/<< pipeline.parameters.project-folder >>
    docker:
      - image: cimg/base:stable
    steps:
      - attach_workspace:
          at: ~/<< pipeline.parameters.project-folder >>
      - add_ssh_keys:
          fingerprints:
            - 'SHA256:UIwOHqUMl4umSJ+Ey3v5ljwWSVGELUlFgOLF+J+yUWg'
      - run:
          name: Deploy to server
          no_output_timeout: 5m
          command: |
            BUILD_DIST_FOLDER="<< pipeline.parameters.build-dist-folder >>"
            PROJECT_FOLDER="<< pipeline.parameters.project-folder >>"
            SERVER_BASE_FOLDER="<< pipeline.parameters.server-base-folder >>"
            TEMP_UPLOAD_FOLDER="${PROJECT_FOLDER}<< pipeline.parameters.temp-upload-folder-slug >>-${CIRCLE_WORKFLOW_ID:-manual}"
            REMOTE_TEMP_DIR="${SERVER_BASE_FOLDER%/}/${TEMP_UPLOAD_FOLDER}"
            DEPLOY_ZIP="${PROJECT_FOLDER}-${CIRCLE_SHA1:-manual}.zip"
            RELEASE_ID="${CIRCLE_SHA1:-manual}"
            RETENTION_DAYS="60"

            mkdir -p ~/.ssh
            ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

            # Prepare unique temp folder
            ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "rm -dRf '$REMOTE_TEMP_DIR' && mkdir -p '$REMOTE_TEMP_DIR'"

            # Zip and upload
            rm -f "$DEPLOY_ZIP"
            (cd "$BUILD_DIST_FOLDER" && zip -qr "../$DEPLOY_ZIP" .)
            scp -P "$SSH_PORT" "$DEPLOY_ZIP" "$SSH_USER@$SSH_HOST:$REMOTE_TEMP_DIR/"

            # Merge release into live folder. Old immutable chunks are retained and cleaned after retention.
            ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
              "bash -s -- '$SERVER_BASE_FOLDER' '<< pipeline.parameters.project-folder >>' '$TEMP_UPLOAD_FOLDER' '$DEPLOY_ZIP' '$RETENTION_DAYS' '$RELEASE_ID'" \
              < scripts/deploy-retained-assets.sh

workflows:
  build-and-deploy:
    jobs:
      - build
      - deploy:
          requires:
            - build
          filters:
            branches:
              only: main
