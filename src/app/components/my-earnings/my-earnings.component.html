<form (submit)="$event.preventDefault(); tryCalculate()">
  @if (userSelection(); as currentUserSelection) {
    @if (!showResults()) {
      <div class="text-center">
        <h1 i18n="@@my-earnings.title">Let's see how much you've already earned today</h1>
        <app-user-selection
          [userSelection]="currentUserSelection"
          [isCompareTool]="false"
        ></app-user-selection>
        <div class="buttons m-t-20">
          <button
            type="submit"
            class="text-center"
            mat-raised-button
            color="primary"
            cdkFocusInitial
          >
            <mat-icon>calculate</mat-icon>&nbsp;<span i18n="@@my-earnings.calculate"
              >Calculate</span
            >
          </button>
          <button type="button" mat-button (click)="shareCurrentUrl()">
            <mat-icon>share</mat-icon>&nbsp;<span i18n="@@my-earnings.share-this">Share this</span>
          </button>
        </div>
      </div>
    }

    @if (showResults()) {
      <div class="text-center">
        <app-my-earnings-details [userSelection]="currentUserSelection"></app-my-earnings-details>
        <div class="buttons m-t-40">
          <button type="button" mat-raised-button (click)="goBack()">
            <mat-icon>edit</mat-icon>&nbsp;<span i18n="@@my-earnings.back">Edit settings</span>
          </button>
          <button type="button" mat-raised-button color="primary" (click)="goToCompare()">
            <mat-icon>compare_arrows</mat-icon>&nbsp;<span i18n="@@my-earnings.compare"
              >Compare</span
            >
          </button>
          <button type="button" mat-raised-button (click)="shareCurrentUrl()">
            <mat-icon>share</mat-icon>&nbsp;<span i18n="@@my-earnings.share-this">Share this</span>
          </button>
        </div>
      </div>
    }
  }
</form>
